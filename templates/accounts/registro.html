
{% extends "base_auth.html" %}

{% block content %}
<div class="container-fluid vh-100 p-0">
    <div class="row g-0 h-100">
        
        <!-- COLUMNA IZQUIERDA: IMAGEN 50% -->
        <div class="col-md-6 d-none d-md-block">
            <img src="/static/images/fondoInicial.png" 
                 alt="Flyer inicial"
                 class="w-100 h-100" 
                 style="object-fit: cover;">
        </div>

        <!-- COLUMNA DERECHA: FORMULARIO 50% -->
        <div class="col-12 col-md-6 d-flex align-items-center justify-content-center py-4" style="overflow-y: auto;">
            <div class="card shadow p-4 w-100 my-auto" style="max-width: 450px;">
                <h1 class="text-center mb-4 titulos-accounts">Crear cuenta</h1>

                <form method="POST" class="card-body contenedor-accounts-form">
                    {% csrf_token %}

                    {% if form.errors %}
                        <div class="alert alert-danger">
                            {{ form.errors }}
                        </div>
                    {% endif %}

                    <div class="mb-3">
                        <label class="form-label">Usuario*</label>
                        {{ form.username }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email*</label>
                        {{ form.email }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Teléfono*</label>
                        {{ form.telefono }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Contraseña*</label>
                        {{ form.password }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Confirmar contraseña*</label>
                        {{ form.confirmPassword }}
                    </div>

                    <button type="submit" class="btn btn-success w-100">Registrarse</button>
                </form>

                <div class="text-center mt-3">
                    <small>¿Ya tienes cuenta? <a href="{% url 'login' %}">Inicia sesión</a></small>
                </div>
            </div>
        </div>

    </div>
</div>
{% endblock %}
