<!--html principal del sistema -->

{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi tienda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href= "{% static 'css/styles.css' %}">
</head>
<body>

    <!-- Uso de sticky-top para que el navbar quede estatico arriba -->
    <nav class="navbar navbar-expand-lg navbar-custom shadow-sm py-3 sticky-top">
        <div class="container">
            <!-- Logo -->
            <a class="navbar-brand brand-custom" href="{% url 'catalogo' %}">La esterilla</a>
            <!-- Botones -->
            <div class="d-flex gap-3">
                <a href="{% url 'ver_carrito' %}" class="btn btn-carrito">Ver carrito</a>

                <a href="{% url 'logout' %}" class="btn btn-logout">Cerrar sesión</a>
            </div>
        </div>
    </nav>

    {% block content %}
    {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
